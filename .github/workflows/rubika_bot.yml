name: Rubika Echo Bot with Offset

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write          # needed to push offset.txt

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours max

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   # fetch all history for git push

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          RUBIKA_TOKEN: ${{ secrets.RUBIKA_TOKEN }}
          PROXY_URL: ${{ secrets.PROXY_URL }}   # only if needed
        run: python bot.py

      - name: Commit and push offset
        if: always()   # run even if the bot script fails
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add offset.txt
          if git diff --staged --quiet; then
            echo "Offset unchanged, nothing to commit."
          else
            git commit -m "Update offset after bot run"
            git push
          fi
